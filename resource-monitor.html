<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>服务器资源监控</title>
    <style>
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #1e1e1e;
            color: #fff;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            color: #61dafb;
            text-shadow: 0 0 10px #61dafb80;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        
        .gauge {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
        }
        
        .gauge-container {
            position: relative;
            width: 150px;
            height: 150px;
        }
        
        .gauge-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #ff4757 0deg,
                #5352ed 2551407CPUdeg,
                #2d3436 2551407CPUdeg
            );
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .gauge-circle::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: #2d2d30;
            border-radius: 50%;
        }
        
        .gauge-value {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .gauge-label {
            text-align: center;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .bar-chart {
            height: 250px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px;
        }
        
        .bar {
            width: 60px;
            background: linear-gradient(to top, #5f27cd, #00d2d3);
            border-radius: 4px 4px 0 0;
            position: relative;
            transition: all 0.3s;
        }
        
        .bar:hover {
            transform: scaleY(1.05);
            background: linear-gradient(to top, #ff6348, #feca57);
        }
        
        .bar-label {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            white-space: nowrap;
        }
        
        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
        }
        
        .process-list {
            list-style: none;
            padding: 0;
        }
        
        .process-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            background: #3c3c3c;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .process-item:hover {
            background: #4a4a4a;
            transform: translateX(5px);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #3c3c3c;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 24px;
            color: #61dafb;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .timestamp {
            text-align: center;
            opacity: 0.7;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1 class="header">🖥️ 服务器资源监控</h1>
    
    <div class="grid">
        <!-- CPU Gauge -->
        <div class="card">
            <div class="gauge">
                <div>
                    <div class="gauge-container">
                        <div class="gauge-circle" style="background: conic-gradient(#ff4757 0deg, #ff4757 23.8deg, #2d3436 23.8deg)">
                            <div class="gauge-value">23.8%</div>
                        </div>
                    </div>
                    <div class="gauge-label">CPU 使用率</div>
                </div>
            </div>
        </div>
        
        <!-- Memory Gauge -->
        <div class="card">
            <div class="gauge">
                <div>
                    <div class="gauge-container">
                        <div class="gauge-circle" style="background: conic-gradient(#26de81 0deg, #26de81 52deg, #2d3436 52deg)">
                            <div class="gauge-value">52%</div>
                        </div>
                    </div>
                    <div class="gauge-label">内存使用率</div>
                    <div>
                        <div style="text-align: center; margin-top: 10px;">
                            <span style="color: #26de81;">1025MB</span> / 
                            <span style="color: #fff;">1967MB</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Disk Gauge -->
        <div class="card">
            <div class="gauge">
                <div>
                    <div class="gauge-container">
                        <div class="gauge-circle" style="background: conic-gradient(#fd9644 0deg, #fd9644 40deg, #2d3436 40deg)">
                            <div class="gauge-value">40%</div>
                        </div>
                    </div>
                    <div class="gauge-label">磁盘使用率</div>
                    <div>
                        <div style="text-align: center; margin-top: 10px;">
                            <span style="color: #fd9644;">19G</span> / 
                            <span style="color: #fff;">50G</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Top Processes -->
        <div class="card">
            <h3 style="text-align: center; margin-bottom: 20px;">🔥 Top 5 进程</h3>
            <ul class="process-list">
                <li class="process-item">
                    <span>openclaw-gatewa...</span>
                    <span>28.1%</span>
                </li>
                <li class="process-item">
                    <span>YDService</span>
                    <span>4.2%</span>
                </li>
                <li class="process-item">
                    <span>tailscaled</span>
                    <span>3.8%</span>
                </li>
                <li class="process-item">
                    <span>CrashCore</span>
                    <span>1.3%</span>
                </li>
                <li class="process-item">
                    <span>multipathd</span>
                    <span>1.3%</span>
                </li>
            </ul>
        </div>
    </div>
    
    <!-- System Stats -->
    <div class="card">
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">1.90</div>
                <div class="stat-label">负载 1分钟</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">138</div>
                <div class="stat-label">总进程数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">3</div>
                <div class="stat-label">在线用户</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">10 hours, 25 minutes</div>
                <div class="stat-label">运行时间</div>
            </div>
        </div>
    </div>
    
    <div class="timestamp">
        监控时间: 2026-03-12 18:51:26
    </div>
</body>
</html>
